name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Install CPU-only torch explicitly. The default torch wheel on PyPI
      # pulls in ~2 GB of CUDA libraries we don't need and which inflate
      # CI install time dramatically.
      - name: Install CPU-only torch
        run: pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision

      - name: Install project and dev/browser deps
        run: pip install -e .[dev] playwright

      - name: Install Firefox for Playwright
        run: playwright install firefox

      # Cache the CLIP model weights across runs. Key is static because the
      # checkpoint is immutable; a fresh key forces a re-download.
      - name: Cache HuggingFace Hub
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-vit-b-32-laion2b-s34b-b79k-v1

      - name: Run tests (including @pytest.mark.slow)
        run: pytest
